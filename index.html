    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #FFC6BD;
            --primary-light: #FFE5DC;
            --primary-dark: #FFB3A3;
            --secondary: #102658;
            --secondary-light: #1a3a7a;
            --text-dark: #102658;
            --text-light: #666;
            --border: #e0e0e0;
            --white: #ffffff;
            --success: #4caf50;
            --warning: #ff9800;
            --error: #f44336;
            --bg: linear-gradient(135deg, #FFC6BD 0%, #FFFFFF 100%);
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            -webkit-font-smoothing: antialiased;
        }

        body {
            display: flex;
            flex-direction: column;
            color: var(--text-dark);
        }

        .splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            gap: 30px;
        }

        .splash-screen.hidden {
            display: none;
        }

        .splash-logo {
            width: 200px;
            height: 200px;
            object-fit: contain;
            animation: fadeInScale 0.8s ease-out;
        }

        .splash-content {
            text-align: center;
            animation: fadeIn 1s ease-out 0.3s both;
        }

        .splash-content h1 {
            font-size: 32px;
            font-weight: 700;
            color: var(--secondary);
            margin-bottom: 10px;
        }

        .splash-content p {
            font-size: 16px;
            color: var(--text-light);
            font-weight: 400;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .app-container {
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 100%;
            position: relative;
        }

        .app-container.splash-visible {
            display: none;
        }

        header {
            background: var(--white);
            padding: 12px 16px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
            z-index: 100;
        }

        .header-logo {
            width: 120px;
            height: auto;
            object-fit: contain;
        }

        .header-controls {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .lang-toggle {
            padding: 6px 12px;
            background: var(--primary-light);
            border: none;
            border-radius: 12px;
            color: var(--secondary);
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Poppins', sans-serif;
        }

        .lang-toggle:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }

        .status-badge {
            padding: 6px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-badge.connected {
            background: rgba(76, 175, 80, 0.2);
            color: #2e7d32;
        }

        .status-badge.disconnected {
            background: rgba(244, 67, 54, 0.2);
            color: #c62828;
        }

        .status-badge.scanning {
            background: rgba(255, 152, 0, 0.2);
            color: #e65100;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            animation: pulse 2s infinite;
        }

        .status-badge.connected .status-dot {
            background: #4caf50;
        }

        .status-badge.disconnected .status-dot {
            background: #f44336;
            animation: none;
        }

        .status-badge.scanning .status-dot {
            background: #ff9800;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 0;
            display: flex;
        }

        .screen {
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            overflow-y: auto;
            padding-bottom: 70px;
        }

        .screen.active {
            display: flex;
        }

        .screen-content {
            padding: 16px;
            flex: 1;
        }

        /* Home Screen */
        .home-screen .screen-content {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .control-card {
            background: var(--white);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        .intensity-ring {
            width: 160px;
            height: 160px;
            margin: 0 auto;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .intensity-circle {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: conic-gradient(
                var(--secondary) 0deg,
                var(--secondary) var(--intensity-angle),
                var(--primary-light) var(--intensity-angle),
                var(--primary-light) 360deg
            );
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 16px rgba(16, 38, 88, 0.15);
        }

        .intensity-inner {
            width: 140px;
            height: 140px;
            background: var(--white);
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }

        .intensity-value {
            font-size: 36px;
            font-weight: 700;
            color: var(--secondary);
        }

        .intensity-label {
            font-size: 12px;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .slider-group {
            margin-top: 16px;
        }

        .slider-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
            color: var(--text-dark);
        }

        .slider-value {
            background: var(--primary-light);
            padding: 4px 10px;
            border-radius: 8px;
            font-weight: 700;
            color: var(--secondary);
        }

        input[type="range"] {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: var(--primary-light);
            outline: none;
            -webkit-appearance: none;
            appearance: none;
            cursor: pointer;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: var(--secondary);
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(16, 38, 88, 0.3);
            transition: all 0.2s ease;
        }

        input[type="range"]::-moz-range-thumb {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: var(--secondary);
            border: none;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(16, 38, 88, 0.3);
            transition: all 0.2s ease;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.1);
        }

        .patterns-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-top: 16px;
        }

        .pattern-btn {
            aspect-ratio: 1;
            border: 2px solid var(--border);
            border-radius: 12px;
            background: var(--white);
            color: var(--text-dark);
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 8px;
            font-family: 'Poppins', sans-serif;
        }

        .pattern-btn:active {
            transform: scale(0.95);
        }

        .pattern-btn:hover {
            border-color: var(--secondary);
            background: var(--primary-light);
        }

        .pattern-btn.active {
            background: var(--secondary);
            color: var(--white);
            border-color: var(--secondary);
        }

        .btn-large {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Poppins', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-connect {
            background: linear-gradient(135deg, var(--secondary) 0%, #1a3a7a 100%);
            color: var(--white);
        }

        .btn-connect:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(16, 38, 88, 0.3);
        }

        .btn-connect:active {
            transform: translateY(0);
        }

        .btn-stop {
            background: var(--error);
            color: var(--white);
            margin-top: 12px;
        }

        .btn-stop:hover {
            background: #d32f2f;
        }

        /* Devices Screen */
        .devices-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 16px;
        }

        .device-item {
            background: var(--white);
            border-radius: 12px;
            padding: 16px;
            border-left: 4px solid var(--secondary);
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        .device-info h3 {
            font-size: 14px;
            font-weight: 600;
            color: var(--secondary);
            margin-bottom: 4px;
        }

        .device-info p {
            font-size: 12px;
            color: var(--text-light);
        }

        .btn-connect-small {
            padding: 8px 16px;
            background: var(--secondary);
            color: var(--white);
            border: none;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Poppins', sans-serif;
        }

        .btn-connect-small:hover {
            background: var(--secondary-light);
        }

        /* Partner Screen */
        .partner-section {
            background: var(--white);
            border-radius: 16px;
            padding: 20px;
            margin-top: 16px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        .partner-section h3 {
            font-size: 16px;
            font-weight: 700;
            color: var(--secondary);
            margin-bottom: 12px;
        }

        .share-link-box {
            background: var(--primary-light);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 12px;
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .share-link-box code {
            flex: 1;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            word-break: break-all;
            color: var(--secondary);
        }

        .btn-copy {
            padding: 8px 12px;
            background: var(--secondary);
